# Render.com blueprint for the SatoshiYield indexer.
# After signing into Render, select "New > Blueprint" and point it at this repo.
services:
  - type: web
    name: satoshi-yield-indexer
    runtime: node
    plan: free
    rootDir: indexer
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: STACKS_API_URL
        value: https://api.testnet.hiro.so
      - key: DEPLOYER_ADDRESS
        value: ST1JXS4BTWDNNEX28QS8ABHQSCAD4BQMAN11TP6B1
      - key: CACHE_TTL_SECONDS
        value: "300"
      # Set CORS_ALLOWED_ORIGINS in the Render dashboard to your deployed
      # frontend URL(s), comma-separated.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
